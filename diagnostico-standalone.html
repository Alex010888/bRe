<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Simulador de diagnóstico y rutas de inspección — Taller ILC, Ingenio La Cabaña." />
  <meta name="theme-color" content="#1B2A4A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>El Diagnóstico · Taller ILC</title>
  <style>
/* ============================================================
   EL DIAGNÓSTICO: Taller ILC — Tema ILC (mobile-first)
   navy #1B2A4A · ámbar #F5A623 · blanco
   Se juega desde el celular en el taller: todo apila a 1 columna.
   ============================================================ */
:root {
  --navy: #1B2A4A;
  --navy-2: #223561;
  --amber: #F5A623;
  --amber-dark: #d98e0f;
  --blanco: #ffffff;
  --gris: #8ea0c0;
  --gris-claro: #e8edf6;
  --verde: #2f9e44;
  --verde-claro: #ebfbee;
  --naranja: #f59f00;
  --rojo: #e03131;
  --rojo-claro: #fff0f0;
  --panel: #ffffff;
  --sombra: 0 6px 20px rgba(9, 18, 40, 0.28);
  --radio: 14px;
  font-synthesis: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Segoe UI", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
  color: #12203c;
  background:
    radial-gradient(1000px 500px at 80% -10%, #26406f 0%, transparent 60%),
    linear-gradient(160deg, var(--navy) 0%, #0f1c36 100%);
  min-height: 100vh; line-height: 1.45;
  -webkit-text-size-adjust: 100%;
}
#app { max-width: 720px; margin: 0 auto; padding: 14px 12px 40px; }

/* ---------- Encabezado ---------- */
.topbar { display: flex; align-items: center; gap: 12px; color: var(--blanco); padding: 4px 2px 14px; }
.topbar .logo {
  width: 40px; height: 40px; border-radius: 10px; flex: none;
  background: var(--amber); color: var(--navy);
  display: grid; place-items: center; font-weight: 800; font-size: 20px; box-shadow: var(--sombra);
}
.topbar h1 { font-size: 1.12rem; letter-spacing: .2px; }
.topbar h1 .pt { color: var(--amber); }
.topbar .sub { color: var(--gris); font-size: .76rem; }
.topbar .spacer { flex: 1; }
.topbar .pill { font-size: .7rem; color: var(--navy); background: var(--gris-claro); padding: 5px 11px; border-radius: 999px; font-weight: 800; }
.pie { color: #6f80a6; font-size: .68rem; text-align: center; margin-top: 22px; }

/* ---------- Tarjetas / bloques ---------- */
.card { background: var(--panel); border-radius: var(--radio); box-shadow: var(--sombra); padding: 16px; margin-bottom: 12px; }
.narrativa { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); color: #eef3ff; border-radius: var(--radio); padding: 14px 16px; margin-bottom: 14px; }
.narrativa h2 { color: var(--amber); font-size: 1rem; margin-bottom: 6px; }
.narrativa p { color: #cdd8ef; font-size: .88rem; }

/* ---------- Botones ---------- */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;
  border: none; border-radius: 12px; font-weight: 800; font-size: .95rem; padding: 13px 18px; width: 100%;
  transition: transform .08s ease, box-shadow .15s ease, background .15s ease; }
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--amber); color: var(--navy); box-shadow: 0 4px 14px rgba(245,166,35,.35); }
.btn-primary:hover { background: var(--amber-dark); }
.btn-primary:disabled { background: var(--gris-claro); color: #9aa8c4; cursor: not-allowed; box-shadow: none; }
.btn-ghost { background: transparent; color: var(--gris); border: 1.5px solid rgba(255,255,255,.2); }
.btn-row { display: flex; gap: 10px; }
.btn-row .btn { width: auto; flex: 1; }

/* ---------- Pantalla 1: Inicio ---------- */
.tabs { display: flex; gap: 8px; margin-bottom: 12px; }
.tabs button { flex: 1; padding: 12px; border-radius: 12px; border: 1.5px solid rgba(255,255,255,.18);
  background: rgba(255,255,255,.05); color: #cdd8ef; font-weight: 800; cursor: pointer; font-size: .92rem; }
.tabs button.sel { background: var(--amber); color: var(--navy); border-color: var(--amber); }
.tabs-esp button { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 9px 6px; font-size: .84rem; }
.tabs-esp button small { font-size: .62rem; font-weight: 800; opacity: .7; letter-spacing: .5px; }

.progreso-barra { display: flex; align-items: center; gap: 10px; color: #eef3ff; margin-bottom: 14px; font-size: .82rem; }
.progreso-barra .rango { font-weight: 800; color: var(--amber); font-size: .95rem; }
.progreso-barra .track { flex: 1; height: 8px; background: rgba(255,255,255,.14); border-radius: 999px; overflow: hidden; }
.progreso-barra .track i { display: block; height: 100%; background: var(--amber); border-radius: 999px; }

.nivel-titulo { color: #cdd8ef; font-size: .78rem; font-weight: 800; text-transform: uppercase; letter-spacing: .6px; margin: 14px 2px 8px; }
.caso-lista { display: grid; grid-template-columns: 1fr; gap: 10px; }
@media (min-width: 560px) { .caso-lista { grid-template-columns: 1fr 1fr; } }
.caso-card { text-align: left; background: var(--panel); border: none; border-radius: var(--radio); box-shadow: var(--sombra);
  padding: 14px; cursor: pointer; position: relative; transition: transform .08s ease; }
.caso-card:active { transform: translateY(1px); }
.caso-card.bloqueada { opacity: .55; cursor: not-allowed; }
.caso-card .cod { font-weight: 800; font-size: .7rem; color: var(--navy); background: var(--gris-claro); border-radius: 6px; padding: 2px 8px; }
.caso-card .equipo { color: var(--navy); font-weight: 800; font-size: 1rem; margin: 8px 0 2px; }
.caso-card .tit { color: #6a7a99; font-size: .8rem; }
.caso-card .estado { position: absolute; top: 12px; right: 12px; font-size: .74rem; font-weight: 800; }
.caso-card .estado.done { color: var(--verde); }
.caso-card .estado.lock { color: #9aa8c4; }
.caso-card .mejor { margin-top: 8px; font-size: .74rem; color: #56668a; }

/* ---------- Pantalla 2: Inspección ---------- */
.sintoma h2 { color: var(--navy); font-size: 1.1rem; margin-bottom: 4px; }
.sintoma .equipo-tag { color: var(--amber-dark); font-weight: 800; font-size: .78rem; text-transform: uppercase; letter-spacing: .4px; }
.sintoma p { color: #33445f; font-size: .92rem; margin-top: 6px; }
.sintoma .contexto { color: #6a7a99; font-size: .82rem; font-style: italic; margin-top: 6px; }

.reloj { margin: 12px 0; }
.reloj .lbl { display: flex; justify-content: space-between; font-size: .8rem; color: #56668a; margin-bottom: 5px; font-weight: 700; }
.reloj .lbl b { color: var(--navy); }
.reloj .track { height: 14px; border-radius: 8px; background: var(--gris-claro); overflow: hidden; }
.reloj .track i { display: block; height: 100%; background: linear-gradient(90deg, var(--verde), var(--amber)); transition: width .3s ease; }
.reloj .track i.poco { background: linear-gradient(90deg, var(--naranja), var(--rojo)); }

.seccion-lbl { font-size: .74rem; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; color: #56668a; margin: 8px 2px; }
.puntos { display: grid; grid-template-columns: 1fr; gap: 8px; }
@media (min-width: 480px) { .puntos { grid-template-columns: 1fr 1fr; } }
.punto { border: 1.5px solid var(--gris-claro); border-radius: 12px; padding: 11px 12px; cursor: pointer; background: #fbfcfe; transition: all .12s ease; }
.punto:hover:not(.rev):not(.no) { border-color: var(--amber); }
.punto .top { display: flex; align-items: center; gap: 8px; }
.punto .nombre { font-weight: 700; color: var(--navy); font-size: .86rem; }
.punto .costo { margin-left: auto; font-size: .74rem; font-weight: 800; color: var(--amber-dark); white-space: nowrap; }
.punto.rev { background: var(--verde-claro); border-color: #b2e0bd; cursor: default; }
.punto.rev .costo { color: #6a7a99; }
.punto.no { opacity: .45; cursor: not-allowed; }
.punto .pista { margin-top: 7px; font-size: .82rem; color: #2c4a30; border-top: 1px dashed #b2e0bd; padding-top: 7px; }

/* Panel de hipótesis */
.hipotesis { display: grid; gap: 6px; }
.hip { display: flex; align-items: center; gap: 10px; padding: 9px 11px; border-radius: 10px; background: #f7f9fc; border: 1px solid var(--gris-claro); }
.hip .ico { width: 22px; height: 22px; border-radius: 50%; display: grid; place-items: center; font-weight: 800; font-size: .8rem; flex: none; color: #fff; background: #b7c2d8; }
.hip.apoya .ico { background: var(--verde); }
.hip.descarta .ico { background: var(--rojo); }
.hip.mixto .ico { background: var(--naranja); }
.hip .nombre { font-size: .85rem; color: var(--navy); font-weight: 600; }
.hip .cuenta { margin-left: auto; font-size: .72rem; color: #8593b0; white-space: nowrap; }

/* ---------- Pantalla 3: Diagnóstico ---------- */
.opciones { display: grid; gap: 9px; margin: 10px 0; }
.opcion { display: flex; align-items: center; gap: 12px; padding: 13px; border: 1.5px solid var(--gris-claro);
  border-radius: 12px; cursor: pointer; background: #fbfcfe; transition: all .12s ease; }
.opcion:hover { border-color: var(--amber); }
.opcion.sel { border-color: var(--amber); background: #fff7e8; }
.opcion .marca { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--gris); flex: none; }
.opcion.sel .marca { border-color: var(--amber-dark); background: var(--amber); box-shadow: inset 0 0 0 3px #fff; }
.opcion .txt { font-size: .9rem; color: var(--navy); font-weight: 600; }
.confianza { font-size: .82rem; padding: 10px 12px; border-radius: 10px; margin: 4px 0 12px; font-weight: 700; }
.confianza.alta { background: var(--verde-claro); color: #1f7a32; }
.confianza.baja { background: #fff4e6; color: #b3630a; }

/* ---------- Pantalla 4: Reparación (repuestos) ---------- */
.repuestos { display: flex; flex-wrap: wrap; gap: 8px; margin: 6px 0 4px; }
.chip { padding: 9px 13px; border-radius: 999px; border: 1.5px solid var(--gris-claro); background: #fbfcfe;
  cursor: pointer; font-size: .82rem; font-weight: 700; color: #3a4a6a; user-select: none; transition: all .12s ease; }
.chip.sel { border-color: var(--amber); background: #fff7e8; color: var(--navy); }
.chip:before { content: "＋ "; color: var(--amber-dark); font-weight: 800; }
.chip.sel:before { content: "✓ "; color: var(--verde); }
.nota-repuestos { font-size: .76rem; color: #6a7a99; margin-top: 8px; }

/* ---------- Pantalla 5: Resultado ---------- */
.score-hero { text-align: center; padding: 8px 0 4px; }
.score-hero .num { font-size: 3rem; font-weight: 800; line-height: 1; color: var(--navy); }
.score-hero .num small { font-size: 1.1rem; color: #8593b0; }
.score-hero .veredicto { font-weight: 800; font-size: 1rem; margin-top: 4px; }
.score-hero .veredicto.ok { color: var(--verde); }
.score-hero .veredicto.mal { color: var(--rojo); }
.desglose { display: grid; gap: 8px; margin: 12px 0; }
.desglose .fila { display: grid; grid-template-columns: 130px 1fr 52px; align-items: center; gap: 10px; font-size: .82rem; }
.desglose .fila .k { color: #56668a; font-weight: 700; }
.desglose .fila .bar { height: 10px; background: var(--gris-claro); border-radius: 6px; overflow: hidden; }
.desglose .fila .bar i { display: block; height: 100%; border-radius: 6px; background: var(--verde); }
.desglose .fila .bar i.neg { background: var(--rojo); }
.desglose .fila .v { text-align: right; font-weight: 800; color: var(--navy); }
.desglose .fila.pen .v { color: var(--rojo); }

.regreso { background: var(--rojo-claro); border: 1px solid #ffc9c9; border-radius: 12px; padding: 13px; margin: 10px 0; }
.regreso .t { color: var(--rojo); font-weight: 800; font-size: .8rem; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
.regreso p { color: #7a2020; font-size: .88rem; }

.leccion { background: var(--navy); color: #eef3ff; border-radius: 12px; padding: 15px; margin: 12px 0; }
.leccion .t { color: var(--amber); font-weight: 800; font-size: .78rem; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 7px; }
.leccion p { font-size: .9rem; margin-bottom: 10px; }
.leccion .dato { border-top: 1px solid rgba(255,255,255,.15); padding-top: 9px; font-size: .82rem; color: #cdd8ef; }
.leccion .dato b { color: var(--amber); }

/* ---------- Modo Ruta de Inspección (pantalla 6) ---------- */
.ruta-lista { display: grid; gap: 8px; }
.ruta-item { border: 1.5px solid var(--gris-claro); border-radius: 12px; overflow: hidden; background: #fbfcfe; }
.ruta-item.marcado { border-color: var(--amber); background: #fff7e8; }
.ruta-item .fila { display: flex; align-items: center; gap: 10px; padding: 11px 12px; cursor: pointer; }
.ruta-item .check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--gris); display: grid; place-items: center; font-weight: 800; color: var(--verde); flex: none; }
.ruta-item.marcado .check { border-color: var(--amber-dark); background: #fff; }
.ruta-item .nombre { font-size: .88rem; color: var(--navy); font-weight: 600; }
.frec-chips { display: flex; gap: 6px; padding: 0 12px 11px 44px; }
.frec-chip { width: 40px; text-align: center; padding: 6px 0; border-radius: 8px; border: 1.5px solid var(--gris-claro); background: #fff; font-weight: 800; font-size: .82rem; color: #6a7a99; cursor: pointer; }
.frec-chip.sel { border-color: var(--amber); background: var(--amber); color: var(--navy); }

.ruta-detalle { display: grid; gap: 6px; }
.ruta-res { display: grid; grid-template-columns: 22px 1fr auto 38px; align-items: center; gap: 8px; font-size: .82rem; padding: 7px 4px; border-bottom: 1px solid var(--gris-claro); }
.ruta-res:last-child { border-bottom: none; }
.ruta-res .ico { width: 22px; height: 22px; border-radius: 50%; display: grid; place-items: center; font-weight: 800; color: #fff; background: #b7c2d8; }
.ruta-res.ok .ico { background: var(--verde); }
.ruta-res.mal .ico { background: var(--rojo); }
.ruta-res.omit .ico { background: var(--naranja); }
.ruta-res.bien-omit .ico { background: #8aa0c8; }
.ruta-res .n { color: var(--navy); font-weight: 600; }
.ruta-res .g { text-align: right; font-weight: 800; color: var(--navy); }
.ruta-res .frec-ok { color: #1f7a32; font-size: .74rem; }
.ruta-res .frec-mal { color: #b3630a; font-size: .74rem; }

/* ---------- Pulido: animaciones y bitácora ---------- */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.fade-in { animation: fadeIn .28s ease both; }

@keyframes pistaIn { from { opacity: 0; transform: translateY(-4px); max-height: 0; } to { opacity: 1; transform: none; max-height: 200px; } }
.punto.recien .pista { animation: pistaIn .3s ease both; }

/* Pista clave recién revelada: destello dorado (una sola vez, solo en ese punto). */
@keyframes claveGlow {
  0% { box-shadow: 0 0 0 0 rgba(245,166,35,.0); }
  25% { box-shadow: 0 0 0 4px rgba(245,166,35,.55); border-color: var(--amber); }
  100% { box-shadow: 0 0 0 0 rgba(245,166,35,0); }
}
.punto.recien.clave-hit { animation: claveGlow .9s ease both; }
.punto .clave-badge { display: inline-block; margin-left: 6px; font-size: .64rem; font-weight: 800; color: var(--amber-dark);
  background: #fff3d6; border-radius: 5px; padding: 1px 5px; vertical-align: middle; }

@keyframes pop { 0% { transform: scale(.6); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
.score-hero .num { animation: pop .5s cubic-bezier(.2,.8,.3,1.2) both; }

/* Barrita de acciones (sonido) */
.acciones-insp { display: flex; align-items: center; gap: 8px; margin: 4px 2px 10px; }
.toggle-son { margin-left: auto; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.18);
  color: #cdd8ef; border-radius: 999px; padding: 5px 11px; font-size: .74rem; font-weight: 700; cursor: pointer; }

/* Bitácora tipo log con hora simulada */
.bitacora { background: #0f1c36; border-radius: 12px; padding: 10px 12px; margin-bottom: 12px; }
.bitacora .t { color: var(--amber); font-size: .68rem; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.bitacora .linea { font-family: "Consolas", ui-monospace, monospace; font-size: .74rem; color: #b9c6e4; padding: 1px 0; }
.bitacora .linea .h { color: var(--amber); }
.bitacora .linea.clave .txt { color: #ffe6ad; font-weight: 700; }

@media (prefers-reduced-motion: reduce) {
  .fade-in, .punto.recien .pista, .punto.recien.clave-hit, .score-hero .num { animation: none !important; }
}
  </style>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="logo">ILC</div>
      <div class="titulo">
        <h1>El Diagnóstico <span class="pt">·</span> Taller</h1>
        <div class="sub">Inspección → Diagnóstico → Reparación</div>
      </div>
      <div class="spacer"></div>
      <div class="pill" id="pill-rango">—</div>
    </header>
    <main id="pantalla"></main>
    <footer class="pie">Ingenio La Cabaña — entrenamiento de confiabilidad · datos Z24/25–Z25/26</footer>
  </div>
  <script>
(function(){
'use strict';

/* ===== js/casos.js ===== */

// ============================================================
// casos.js — BANCO DE CASOS de "EL DIAGNÓSTICO: Taller ILC"
// ------------------------------------------------------------
// SOLO DATOS. El motor (engine.js) los consume sin conocer su
// contenido: agregar un caso #13 = solo editar este archivo.
//
// Esquema de un caso (ver brief §3.1):
//   id, especialidad('MEC'|'ELE'), nivel(1|2|3),
//   equipo, titulo, sintoma, contexto, tiempoMin (presupuesto),
//   puntos:      [{ id, nombre, costo(min), pista,
//                   apunta:[hipId], descarta:[hipId], clave? }]
//   hipotesis:   [{ id, nombre, real?, parcial? }]  (UNA real; 'combinada' = 1 entrada)
//   reparaciones:[{ id, nombre, correcta, repuestos:[], siIncorrecta }]
//   repuestosDisponibles: [str]   (requeridos + distractores, para la UI)
//   leccion:     { texto, datoILC }
//
// Convenciones de calibración:
//  - 'clave: true' marca las PISTAS CLAVE (las que revelan/confirman la
//    causa real). El motor las usa para la eficiencia y la penalización
//    "a ciegas". Cada caso tiene >= 1 (los combinados, 2).
//  - Costos en minutos; presupuesto estándar 30 min (nivel 3: 25 min).
//    En varios casos la suma de todos los puntos EXCEDE el presupuesto:
//    es a propósito — castiga al "revisatodo".
// ============================================================

// ---------------------------------------------------------------
// RUTA MECÁNICO (TAM)
// ---------------------------------------------------------------

const M1 = {
  id: 'M1', especialidad: 'MEC', nivel: 1,
  equipo: 'Bomba de jugo #3',
  titulo: 'CASO ESTRELLA — fuga por el sello (tercer cambio en 6 semanas)',
  sintoma: 'Fuga de jugo por el sello mecánico de la bomba #3.',
  contexto: 'Zafra, semana 9. La bomba ya lleva tres cambios de sello en seis semanas.',
  tiempoMin: 30,
  puntos: [
    { id: 'p1', nombre: 'Historial del equipo', costo: 2,
      pista: '3 OTs previas, todas "cambio de sello", ninguna investigó la causa.',
      apunta: ['h3'], descarta: [] },
    { id: 'p2', nombre: 'Caras del sello retirado', costo: 5,
      pista: 'Desgaste desparejo, astillado de un solo lado → apunta a desalineación.',
      apunta: ['h3'], descarta: [] },
    { id: 'p3', nombre: 'Estado de la camisa de eje (requiere desmontaje)', costo: 8,
      pista: 'Rayadura axial profunda en la camisa: el sello nunca va a asentar.',
      apunta: ['h3'], descarta: [], clave: true },
    { id: 'p4', nombre: 'Alineación motor-bomba', costo: 6,
      pista: '0.45 mm fuera de tolerancia: desalineación paralela confirmada.',
      apunta: ['h3'], descarta: [], clave: true },
    { id: 'p5', nombre: 'Presión de succión', costo: 4,
      pista: 'Presión de succión normal → descarta cavitación.',
      apunta: [], descarta: ['h2'] },
    { id: 'p6', nombre: 'Vibración', costo: 5,
      pista: '4.6 mm/s — Zona C ISO 10816-3, apoya desalineación.',
      apunta: ['h3'], descarta: [] },
    { id: 'p7', nombre: 'Línea de flush del sello', costo: 3,
      pista: 'Flush operativo y con caudal → descarta operación en seco.',
      apunta: [], descarta: ['h4'] },
  ],
  hipotesis: [
    { id: 'h1', nombre: 'Sello defectuoso de fábrica' },
    { id: 'h2', nombre: 'Cavitación' },
    { id: 'h3', nombre: 'Camisa rayada + desalineación (causa combinada)', real: true },
    { id: 'h4', nombre: 'Operación en seco' },
  ],
  reparaciones: [
    { id: 'r1', nombre: 'Cambiar camisa + alinear + sello nuevo', correcta: true,
      repuestos: ['sello', 'camisa', 'empaques', 'calzas'], siIncorrecta: null },
    { id: 'r2', nombre: 'Cambiar solo el sello', correcta: false, repuestos: [],

/* ===== js/rng.js ===== */

// ============================================================
// rng.js — Generador de números aleatorios con semilla (mulberry32)
// ------------------------------------------------------------
// Mismo motor de azar que ZAFRA: determinismo total (misma semilla
// => misma secuencia), estado serializable en un entero de 32 bits.
// En "El Diagnóstico" el SCORING NO depende del azar: el RNG solo
// se usa para barajar el orden de presentación de puntos/repuestos
// en la UI, de forma reproducible.
// ============================================================

/** Crea un RNG con semilla, con get/setState para persistir el cursor. */
function makeRng(seed) {
  let a = seed >>> 0;
  const rng = () => {
    a |= 0;
    a = (a + 0x6d2b79f5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
  rng.getState = () => a >>> 0;
  rng.setState = (s) => { a = s >>> 0; };
  return rng;
}

/** Entero uniforme en [min, max] (ambos inclusive). */
function randInt(rng, min, max) {
  return Math.floor(min + rng() * (max - min + 1));
}

/** Baraja una copia del arreglo (Fisher-Yates) de forma determinista. */
function barajar(rng, arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = randInt(rng, 0, i);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ===== js/engine.js ===== */

// ============================================================
// engine.js — Motor PURO de "EL DIAGNÓSTICO: Taller ILC"
// ------------------------------------------------------------
// Regla de oro (igual que ZAFRA): sin DOM, sin Math.random(),
// sin estado global. El SCORING es 100% determinista a partir
// de las decisiones del jugador; el azar (barajar) es solo de
// presentación en la UI y NO afecta el puntaje.
//
// Ciclo de vida del estado de un caso:
//   crearEstadoCaso(caso)              -> estado en fase 'inspeccion'
//   revelarPunto(estado, puntoId)      -> gasta minutos y devuelve la pista
//   indicadores(estado)                -> apoya/descarta por hipótesis
//   diagnosticar(estado, hipId)        -> fija el diagnóstico (congela "a ciegas")
//   reparar(estado, repId, repuestos)  -> fija reparación + repuestos
//   evaluarCaso(estado)                -> desglose de score + narrativa + lección
//   jugarCaso(caso, jugador)           -> atajo determinista de fin a fin
// ============================================================





const clamp = (x, lo, hi) => Math.min(hi, Math.max(lo, x));

// ------------------------------------------------------------
// Configuración de puntaje (brief §3.2). Todo tunable aquí.
// ------------------------------------------------------------
const SCORING = {
  diagnostico: { correcto: 50, parcial: 25 },
  eficiencia: { max: 25, penalIrrelevante: 0.15 }, // 25 × (claveRev/claveTot) × (1 − irrelevantes×0.15)
  reparacion: { intervencion: 15, repuestos: 10 },  // suman 25
  penalRetorno: 20,   // reparación incorrecta -> el equipo regresa
  penalACiegas: 10,   // diagnosticar con < min(2, claveTotales) pistas clave
  umbralACiegas: 2,
};

// ------------------------------------------------------------
// Helpers de acceso
// ------------------------------------------------------------
function getCaso(estado) {
  const caso = CASOS_POR_ID[estado.casoId];
  if (!caso) throw new Error(`Caso desconocido: ${estado.casoId}`);
  return caso;
}
const puntoDe = (caso, id) => caso.puntos.find((p) => p.id === id);
const puntosClaveTotales = (caso) => caso.puntos.filter((p) => p.clave).length;

// ------------------------------------------------------------
// 1. Estado inicial de un caso
// ------------------------------------------------------------
function crearEstadoCaso(caso) {
  return {
    casoId: caso.id,
    tiempoMin: caso.tiempoMin,
    tiempoRestante: caso.tiempoMin,
    revelados: [],            // ids de puntos revelados, en orden
    diagnostico: null,        // hipId elegido
    claveAlDiagnosticar: null,// # de pistas clave reveladas al momento de diagnosticar
    reparacion: null,         // repId elegido
    repuestosSel: [],         // repuestos marcados por el jugador
    fase: 'inspeccion',       // 'inspeccion' | 'reparacion' | 'fin'
    log: [],
  };
}

// ------------------------------------------------------------
// 2. Inspección — revelar un punto (gasta minutos)
// ------------------------------------------------------------
// Devuelve { ok, motivo?, pista? }. No lanza: la UI decide qué mostrar.
function revelarPunto(estado, puntoId) {
  if (estado.fase !== 'inspeccion') return { ok: false, motivo: 'La inspección ya cerró.' };
  const caso = getCaso(estado);
  const punto = puntoDe(caso, puntoId);
  if (!punto) return { ok: false, motivo: 'Punto inexistente.' };
  if (estado.revelados.includes(puntoId)) return { ok: false, motivo: 'Ya revelaste ese punto.' };
  if (punto.costo > estado.tiempoRestante) return { ok: false, motivo: 'No te queda tiempo para eso.' };

  estado.tiempoRestante -= punto.costo;
  estado.revelados.push(puntoId);
  estado.log.push(`Inspección (${punto.costo} min): ${punto.nombre} → ${punto.pista}`);
  return { ok: true, pista: punto.pista };
}

// Indicadores por hipótesis según los puntos ya revelados.
// { [hipId]: { apoya, descarta, estado:'apoya'|'descarta'|'mixto'|'sin' } }
function indicadores(estado) {
  const caso = getCaso(estado);
  const out = {};
  for (const h of caso.hipotesis) out[h.id] = { apoya: 0, descarta: 0, estado: 'sin' };
  for (const id of estado.revelados) {
    const p = puntoDe(caso, id);
    for (const hid of p.apunta || []) if (out[hid]) out[hid].apoya += 1;
    for (const hid of p.descarta || []) if (out[hid]) out[hid].descarta += 1;
  }
  for (const h of caso.hipotesis) {
    const o = out[h.id];
    if (o.apoya && o.descarta) o.estado = 'mixto';
    else if (o.apoya) o.estado = 'apoya';
    else if (o.descarta) o.estado = 'descarta';
  }
  return out;
}

// Nº de pistas clave reveladas hasta ahora.
function pistasClaveReveladas(estado) {
  const caso = getCaso(estado);
  return estado.revelados.filter((id) => puntoDe(caso, id).clave).length;
}

// ------------------------------------------------------------
// 3. Diagnóstico — congela la "certeza" al momento de decidir
// ------------------------------------------------------------
function diagnosticar(estado, hipId) {
  const caso = getCaso(estado);
  if (!caso.hipotesis.some((h) => h.id === hipId)) return { ok: false, motivo: 'Hipótesis inexistente.' };
  estado.diagnostico = hipId;
  estado.claveAlDiagnosticar = pistasClaveReveladas(estado);
  estado.fase = 'reparacion';
  const h = caso.hipotesis.find((x) => x.id === hipId);
  estado.log.push(`Diagnóstico: ${h.nombre} (con ${estado.claveAlDiagnosticar} pista(s) clave).`);
  return { ok: true };
}

// ------------------------------------------------------------
// 4. Reparación + repuestos
// ------------------------------------------------------------
function reparar(estado, repId, repuestos = []) {
  const caso = getCaso(estado);
  const rep = caso.reparaciones.find((r) => r.id === repId);
  if (!rep) return { ok: false, motivo: 'Reparación inexistente.' };
  estado.reparacion = repId;
  estado.repuestosSel = [...repuestos];
  estado.fase = 'fin';
  estado.log.push(`Reparación: ${rep.nombre}.`);
  return { ok: true };
}

// ¿El jugador marcó exactamente los repuestos requeridos por la reparación?
function repuestosCompletos(requeridos, seleccionados) {
  const req = requeridos || [];
  const todosPresentes = req.every((r) => seleccionados.includes(r));
  const sinDistractores = seleccionados.every((s) => req.includes(s));
  return todosPresentes && sinDistractores;
}

// ------------------------------------------------------------
// 5. Evaluación del caso (100 pts, brief §3.2)
// ------------------------------------------------------------
function evaluarCaso(estado, scoring = SCORING) {
  const caso = getCaso(estado);

  // --- Diagnóstico ---
  const hip = caso.hipotesis.find((h) => h.id === estado.diagnostico) || null;
  let ptsDiagnostico = 0;
  if (hip?.real) ptsDiagnostico = scoring.diagnostico.correcto;
  else if (hip?.parcial) ptsDiagnostico = scoring.diagnostico.parcial;

  // --- Eficiencia de inspección ---
  const claveTot = puntosClaveTotales(caso);
  const claveRev = pistasClaveReveladas(estado);
  const irrelevantesRev = estado.revelados.filter((id) => !puntoDe(caso, id).clave).length;
  const cobertura = claveTot > 0 ? claveRev / claveTot : 1;
  const factorRuido = Math.max(0, 1 - irrelevantesRev * scoring.eficiencia.penalIrrelevante);
  const ptsEficiencia = clamp(scoring.eficiencia.max * cobertura * factorRuido, 0, scoring.eficiencia.max);

  // --- Reparación + repuestos ---
  const rep = caso.reparaciones.find((r) => r.id === estado.reparacion) || null;
  let ptsReparacion = 0;
  let narrativa = null;
  let equipoRegresa = false;
  if (rep) {
    if (rep.correcta) {
      const completos = repuestosCompletos(rep.repuestos, estado.repuestosSel);
      ptsReparacion = scoring.reparacion.intervencion + (completos ? scoring.reparacion.repuestos : 0);
    } else {
      equipoRegresa = true;
      narrativa = rep.siIncorrecta;
    }
  }

  // --- Penalizaciones ---
  const penalRetorno = equipoRegresa ? scoring.penalRetorno : 0;
  const umbral = Math.min(scoring.umbralACiegas, claveTot || scoring.umbralACiegas);
  const claveDecision = estado.claveAlDiagnosticar ?? claveRev;
  const aCiegas = hip !== null && claveDecision < umbral;
  const penalACiegas = aCiegas ? scoring.penalACiegas : 0;

  const total = clamp(
    ptsDiagnostico + ptsEficiencia + ptsReparacion - penalRetorno - penalACiegas,
    0, 100,
  );

  return {
    casoId: caso.id,
    total: Math.round(total * 10) / 10,
    aprobado: !equipoRegresa && hip?.real === true,
    componentes: {
      diagnostico: Math.round(ptsDiagnostico * 10) / 10,
      eficiencia: Math.round(ptsEficiencia * 10) / 10,
      reparacion: Math.round(ptsReparacion * 10) / 10,
    },
    penalizaciones: { retorno: penalRetorno, aCiegas: penalACiegas },
    detalle: {
      diagnosticoElegido: hip?.nombre ?? null,
      diagnosticoCorrecto: !!hip?.real,
      claveReveladas: claveRev,
      claveTotales: claveTot,
      puntosIrrelevantes: irrelevantesRev,
      minutosUsados: estado.tiempoMin - estado.tiempoRestante,
      reparacionCorrecta: !!rep?.correcta,
      equipoRegresa,
    },
    narrativa,             // "Día +5: la bomba fuga otra vez…" si el equipo regresa
    leccion: caso.leccion, // pantalla de lección con el dato real ILC
  };
}

// ------------------------------------------------------------
// 6. Barajado de presentación (para la UI, no afecta el score)
// ------------------------------------------------------------
function barajarCaso(caso, seed) {
  const rng = makeRng(seed >>> 0);
  return {
    ...caso,
    puntos: barajar(rng, caso.puntos),
    hipotesis: barajar(rng, caso.hipotesis),
    reparaciones: barajar(rng, caso.reparaciones),
    repuestosDisponibles: barajar(rng, caso.repuestosDisponibles),
  };
}

// ============================================================
// MODO RUTA DE INSPECCIÓN (brief §6) — scoring puro
// ------------------------------------------------------------
// +10 por marcar un punto que pertenece; bonus por frecuencia
// correcta; −5 por marcar un distractor. Puntos omitidos: 0.
// selecciones: { [puntoId]: 'D'|'S'|'M' }  (presencia = marcado)
// ============================================================
const SCORING_RUTA = { acierto: 10, frecuencia: 5, distractor: 5 };
function barajarRuta(ruta, seed) {
  const rng = makeRng(seed >>> 0);
  return { ...ruta, puntos: barajar(rng, ruta.puntos) };
}
function evaluarRuta(ruta, selecciones = {}, scoring = SCORING_RUTA) {
  let total = 0, totalMax = 0;
  let aciertos = 0, omitidos = 0, distractoresMarcados = 0, frecuenciasCorrectas = 0;
  const detalle = [];

  for (const p of ruta.puntos) {
    const marcado = Object.prototype.hasOwnProperty.call(selecciones, p.id);
    const frecElegida = selecciones[p.id] || null;
    let ganado = 0;
    let frecuenciaOk = false;

    if (p.pertenece) {
      totalMax += scoring.acierto + scoring.frecuencia;
      if (marcado) {
        ganado += scoring.acierto;
        aciertos += 1;
        if (frecElegida === p.frecuencia) { ganado += scoring.frecuencia; frecuenciaOk = true; frecuenciasCorrectas += 1; }
      } else {
        omitidos += 1;
      }
    } else if (marcado) {
      ganado -= scoring.distractor;
      distractoresMarcados += 1;
    }

    total += ganado;
    detalle.push({
      id: p.id, nombre: p.nombre, pertenece: p.pertenece,
      marcado, frecuenciaElegida: frecElegida, frecuenciaCorrecta: p.frecuencia || null,
      frecuenciaOk, ganado, motivo: p.motivo || null, nota: p.nota || null,
    });
  }

  const totalPct = totalMax > 0 ? clamp(Math.round((total / totalMax) * 100), 0, 100) : 0;
  const perteneceTot = ruta.puntos.filter((p) => p.pertenece).length;
  return {
    rutaId: ruta.id, total, totalMax, totalPct,
    aciertos, omitidos, distractoresMarcados, frecuenciasCorrectas, perteneceTot,
    detalle,
  };
}

// ------------------------------------------------------------
// 7. Atajo de simulación (para jugadores/tests)
// ------------------------------------------------------------
// jugador: (estado, caso) => void  (conduce el caso vía las funciones del motor)
function jugarCaso(caso, jugador) {
  const estado = crearEstadoCaso(caso);
  jugador(estado, caso);
  return { estado, resultado: evaluarCaso(estado) };
}

// ============================================================
// ui.js — Render de las 5 pantallas del Modo Diagnóstico.
// Funciones PURAS: reciben el estado de presentación y devuelven
// HTML (string). Los eventos y las transiciones viven en main.js.
// ============================================================





// Rangos de progresión por puntaje acumulado (por especialidad).
const RANGOS = [
  { min: 0, nombre: 'Aprendiz' },
  { min: 150, nombre: 'Técnico' },
  { min: 350, nombre: 'Especialista' },
];
const RANGO_TOPE = 500; // para la barra de progreso
function rangoDe(puntaje) {
  let r = RANGOS[0];
  for (const x of RANGOS) if (puntaje >= x.min) r = x;
  return r;
}

const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const ESP = { MEC: 'Mecánico', ELE: 'Electricista', INS: 'Instrumentista' };
const ESP_TALLER = { MEC: 'TAM', ELE: 'TAE', INS: 'MTI' };
const NIVEL = { 1: 'Aprendiz', 2: 'Técnico', 3: 'Especialista' };

// ¿Está desbloqueado el caso? Nivel 1 siempre; nivel N exige
// haber aprobado algún caso de nivel N-1 de la misma especialidad.
function desbloqueado(caso, progreso) {
  if (caso.nivel <= 1) return true;
  return CASOS.some((c) => c.especialidad === caso.especialidad && c.nivel === caso.nivel - 1 && progreso.aprobado[c.id]);
}

// ------------------------------------------------------------
// Pantalla 1 — Inicio
// ------------------------------------------------------------
function pantallaInicio(app) {
  const modo = app.modo || 'diagnostico';
  const modoTabs = `
    <div class="tabs">
      <button data-modo="diagnostico" class="${modo === 'diagnostico' ? 'sel' : ''}">🩺 Diagnóstico</button>
      <button data-modo="ruta" class="${modo === 'ruta' ? 'sel' : ''}">📋 Ruta de inspección</button>
    </div>`;
  if (modo === 'ruta') return modoTabs + pantallaRutasInterna();

  const { especialidad, progreso } = app;
  const casos = CASOS.filter((c) => c.especialidad === especialidad);
  const acum = casos.reduce((a, c) => a + (progreso.best[c.id] || 0), 0);
  const rango = rangoDe(acum);
  const pct = Math.min(100, Math.round((acum / RANGO_TOPE) * 100));

  const porNivel = [1, 2, 3].map((nivel) => {
    const grupo = casos.filter((c) => c.nivel === nivel);
    if (!grupo.length) return '';
    const cards = grupo.map((c) => casoCard(c, progreso)).join('');
    return `<div class="nivel-titulo">Nivel ${nivel} · ${NIVEL[nivel]}</div><div class="caso-lista">${cards}</div>`;
  }).join('');

  return `
    ${modoTabs}
    <div class="narrativa">
      <h2>Elegí un caso del taller</h2>
      <p>Recibís un equipo con un síntoma y un presupuesto de tiempo de inspección.
      Revisá con criterio, diagnosticá la causa y reparala bien. Cambiar la pieza sin
      buscar la causa hace que el equipo <b>regrese</b>.</p>
    </div>
    <div class="tabs tabs-esp">
      <button data-esp="MEC" class="${especialidad === 'MEC' ? 'sel' : ''}">🔧 ${ESP.MEC}<small>TAM</small></button>
      <button data-esp="ELE" class="${especialidad === 'ELE' ? 'sel' : ''}">⚡ ${ESP.ELE}<small>TAE</small></button>
      <button data-esp="INS" class="${especialidad === 'INS' ? 'sel' : ''}">🎛️ ${ESP.INS}<small>MTI</small></button>
    </div>
    <div class="progreso-barra">
      <span class="rango">${rango.nombre}</span>
      <span class="track"><i style="width:${pct}%"></i></span>
      <span>${acum} pts</span>
    </div>
    ${porNivel}`;
}

function casoCard(caso, progreso) {
  const abierto = desbloqueado(caso, progreso);
  const best = progreso.best[caso.id];
  const aprobado = progreso.aprobado[caso.id];
  const estado = !abierto
    ? '<span class="estado lock">🔒</span>'
    : (aprobado ? '<span class="estado done">✓</span>' : '');
  const mejor = best != null ? `<div class="mejor">Mejor puntaje: <b>${best}</b></div>` : '';
  return `
    <button class="caso-card ${abierto ? '' : 'bloqueada'}" ${abierto ? `data-caso="${caso.id}"` : 'disabled'}>
      ${estado}
      <span class="cod">${caso.id}</span>
      <div class="equipo">${esc(caso.equipo)}</div>
      <div class="tit">${esc(caso.titulo)}</div>
      ${mejor}
    </button>`;
}

// ------------------------------------------------------------
// Pantalla 2 — Inspección
// ------------------------------------------------------------
const dosDig = (n) => String(n).padStart(2, '0');
const horaSim = (min) => `${dosDig(Math.floor(min / 60) % 24)}:${dosDig(min % 60)}`;
function pantallaInspeccion(app) {
  const { view, estado } = app;
  const usados = estado.tiempoMin - estado.tiempoRestante;
  const pct = Math.round((estado.tiempoRestante / estado.tiempoMin) * 100);
  const poco = pct <= 30 ? 'poco' : '';
  const recienId = app.ultimoRevelado;
  const son = app.sonido !== false;

  const puntos = view.puntos.map((p) => {
    const rev = estado.revelados.includes(p.id);
    const noAlcanza = !rev && p.costo > estado.tiempoRestante;
    const recien = rev && p.id === recienId;
    const cls = [rev ? 'rev' : (noAlcanza ? 'no' : ''), recien ? 'recien' : '', recien && p.clave ? 'clave-hit' : ''].join(' ').trim();
    const attr = rev || noAlcanza ? '' : `data-punto="${p.id}"`;
    const badge = rev && p.clave ? '<span class="clave-badge">★ clave</span>' : '';
    const pista = rev ? `<div class="pista">${esc(p.pista)}</div>` : '';
    return `
      <div class="punto ${cls}" ${attr}>
        <div class="top">
          <span class="nombre">${esc(p.nombre)}${badge}</span>
          <span class="costo">${rev ? '✓' : p.costo + ' min'}</span>
        </div>
        ${pista}
      </div>`;
  }).join('');

  const ind = indicadores(estado);
  const hips = view.hipotesis.map((h) => {
    const o = ind[h.id];
    const icoTxt = o.estado === 'apoya' ? '✓' : o.estado === 'descarta' ? '✗' : o.estado === 'mixto' ? '±' : '—';
    const cuenta = o.apoya || o.descarta ? `${o.apoya}✓ · ${o.descarta}✗` : 'sin datos';
    return `<div class="hip ${o.estado}"><span class="ico">${icoTxt}</span><span class="nombre">${esc(h.nombre)}</span><span class="cuenta">${cuenta}</span></div>`;
  }).join('');

  // Bitácora tipo log con hora simulada (turno arranca 07:00).
  let acum = 0;
  const lineas = estado.revelados.map((id) => {
    const p = view.puntos.find((x) => x.id === id);
    if (!p) return '';
    acum += p.costo;
    return `<div class="linea ${p.clave ? 'clave' : ''}"><span class="h">${horaSim(7 * 60 + acum)}</span> <span class="txt">${esc(p.nombre)}</span></div>`;
  }).join('');
  const bitacora = estado.revelados.length
    ? `<div class="bitacora"><div class="t">Bitácora · turno</div>${lineas}</div>` : '';

  return `
    <div class="card sintoma">
      <div class="equipo-tag">${view.id} · ${esc(view.equipo)}</div>
      <h2>${esc(view.titulo)}</h2>
      <p>${esc(view.sintoma)}</p>
      <div class="contexto">${esc(view.contexto)}</div>
    </div>

    <div class="reloj">
      <div class="lbl"><span>Tiempo de inspección</span><b>${estado.tiempoRestante} / ${estado.tiempoMin} min</b></div>
      <div class="track"><i class="${poco}" style="width:${pct}%"></i></div>
    </div>

    <div class="acciones-insp">
      <span class="seccion-lbl" style="margin:0">Puntos — tocá para revisar</span>
      <button class="toggle-son" data-sonido>${son ? '🔊 sonido' : '🔇 silencio'}</button>
    </div>
    <div class="card"><div class="puntos">${puntos}</div></div>

    <div class="card">
      <div class="seccion-lbl">Hipótesis (${usados} min usados)</div>
      <div class="hipotesis">${hips}</div>
    </div>

    ${bitacora}

    <button class="btn btn-primary" id="btn-diagnosticar">Ya sé qué es — Diagnosticar →</button>
    <div style="height:8px"></div>
    <button class="btn btn-ghost" id="btn-abandonar">← Volver al taller</button>`;
}

// ------------------------------------------------------------
// Pantalla 3 — Diagnóstico
// ------------------------------------------------------------
function pantallaDiagnostico(app) {
  const { view, estado, seleccionHip } = app;
  const claveRev = pistasClaveReveladas(estado);
  const claveTot = view.puntos.filter((p) => p.clave).length;
  const umbral = Math.min(SCORING.umbralACiegas, claveTot || SCORING.umbralACiegas);
  const suficiente = claveRev >= umbral;
  const conf = suficiente
    ? `<div class="confianza alta">Revelaste ${claveRev} pista(s) clave: tenés base para decidir.</div>`
    : `<div class="confianza baja">Solo ${claveRev} pista(s) clave. Diagnosticar ahora es "a ciegas" (−${SCORING.penalACiegas} pts aunque aciertes).</div>`;

  const ops = view.hipotesis.map((h) => `
    <div class="opcion ${seleccionHip === h.id ? 'sel' : ''}" data-hip="${h.id}">
      <span class="marca"></span><span class="txt">${esc(h.nombre)}</span>
    </div>`).join('');

  return `
    <div class="card">
      <div class="seccion-lbl">${view.id} · ¿Cuál es la causa?</div>
      ${conf}
      <div class="opciones">${ops}</div>
    </div>
    <button class="btn btn-primary" id="btn-confirmar-dx" ${seleccionHip ? '' : 'disabled'}>Confirmar diagnóstico →</button>
    <div style="height:8px"></div>
    <button class="btn btn-ghost" id="btn-volver-insp">← Seguir inspeccionando</button>`;
}

// ------------------------------------------------------------
// Pantalla 4 — Reparación + repuestos
// ------------------------------------------------------------
function pantallaReparacion(app) {
  const { view, seleccionRep, repuestosSel } = app;
  const ops = view.reparaciones.map((r) => `
    <div class="opcion ${seleccionRep === r.id ? 'sel' : ''}" data-rep="${r.id}">
      <span class="marca"></span><span class="txt">${esc(r.nombre)}</span>
    </div>`).join('');

  const hayRepuestos = view.repuestosDisponibles && view.repuestosDisponibles.length;
  const chips = hayRepuestos
    ? view.repuestosDisponibles.map((rp) => `<span class="chip ${repuestosSel.includes(rp) ? 'sel' : ''}" data-repuesto="${esc(rp)}">${esc(rp)}</span>`).join('')
    : '<div class="nota-repuestos">Esta intervención no requiere repuestos: es método y mano de obra.</div>';

  return `
    <div class="card">
      <div class="seccion-lbl">${view.id} · ¿Qué intervención hacés?</div>
      <div class="opciones">${ops}</div>
    </div>
    <div class="card">
      <div class="seccion-lbl">Repuestos a solicitar</div>
      <div class="repuestos">${chips}</div>
      ${hayRepuestos ? '<div class="nota-repuestos">Marcá exactamente los que necesita el trabajo. De más o de menos, resta.</div>' : ''}
    </div>
    <button class="btn btn-primary" id="btn-reparar" ${seleccionRep ? '' : 'disabled'}>Ejecutar reparación ✓</button>`;
}

// ------------------------------------------------------------
// Pantalla 5 — Resultado
// ------------------------------------------------------------
function pantallaResultado(app, res) {
  const c = res.componentes;
  const p = res.penalizaciones;
  const veredicto = res.aprobado
    ? '<div class="veredicto ok">✓ Diagnóstico resuelto</div>'
    : (res.detalle.equipoRegresa ? '<div class="veredicto mal">✗ El equipo regresó</div>' : '<div class="veredicto mal">Diagnóstico incompleto</div>');

  const fila = (k, val, max, neg) => `
    <div class="fila ${neg ? 'pen' : ''}">
      <span class="k">${k}</span>
      <span class="bar"><i class="${neg ? 'neg' : ''}" style="width:${Math.round((val / max) * 100)}%"></i></span>
      <span class="v">${neg ? '−' : ''}${val}</span>
    </div>`;

  const desglose = [
    fila('Diagnóstico', c.diagnostico, 50, false),
    fila('Eficiencia', c.eficiencia, 25, false),
    fila('Reparación', c.reparacion, 25, false),
    p.retorno ? fila('Retorno del equipo', p.retorno, 20, true) : '',
    p.aCiegas ? fila('Diagnóstico a ciegas', p.aCiegas, 10, true) : '',
  ].join('');

  const regreso = res.narrativa
    ? `<div class="regreso"><div class="t">Consecuencia</div><p>${esc(res.narrativa)}</p></div>` : '';

  return `
    <div class="card">
      <div class="score-hero">
        <div class="num">${res.total}<small> / 100</small></div>
        ${veredicto}
      </div>
      <div class="desglose">${desglose}</div>
    </div>
    ${regreso}
    <div class="leccion">
      <div class="t">Lección</div>
      <p>${esc(res.leccion.texto)}</p>
      <div class="dato">📊 <b>Dato ILC:</b> ${esc(res.leccion.datoILC)}</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" id="btn-taller">← Al taller</button>
      <button class="btn btn-primary" id="btn-siguiente">Siguiente caso →</button>
    </div>`;
}

// Lista de rutas (se renderiza dentro de pantallaInicio cuando modo='ruta').
function pantallaRutasInterna() {
  const cards = RUTAS.map((r) => {
    const n = r.puntos.filter((p) => p.pertenece).length;
    return `
      <button class="caso-card" data-ruta="${r.id}">
        <span class="cod">${r.id}</span>
        <div class="equipo">${esc(r.equipo)}</div>
        <div class="tit">${esc(r.titulo)} · ${n} puntos + distractores</div>
      </button>`;
  }).join('');
  return `
    <div class="narrativa">
      <h2>Armá la ruta preventiva</h2>
      <p>Marcá los puntos que <b>sí</b> pertenecen a la ruta y elegí su frecuencia.
      Los distractores restan. Tenés el reloj en contra.</p>
    </div>
    <div class="caso-lista">${cards}</div>`;
}

// Barra de tiempo de la ruta (se refresca sola cada segundo desde main.js).
function relojRutaHTML(restante, total) {
  const pct = Math.max(0, Math.round((restante / total) * 100));
  const poco = pct <= 30 ? 'poco' : '';
  return `
    <div class="lbl"><span>Tiempo</span><b>${restante}s / ${total}s</b></div>
    <div class="track"><i class="${poco}" style="width:${pct}%"></i></div>`;
}
function pantallaRuta(app) {
  const { rutaView: r, marcas, rutaTiempo } = app;
  const items = r.puntos.map((p) => {
    const marcado = Object.prototype.hasOwnProperty.call(marcas, p.id);
    const frec = marcas[p.id] || null;
    const chips = marcado
      ? `<div class="frec-chips">${Object.keys(FRECUENCIAS).map((f) =>
          `<span class="frec-chip ${frec === f ? 'sel' : ''}" data-ruta-frec="${p.id}:${f}">${f}</span>`).join('')}</div>`
      : '';
    return `
      <div class="ruta-item ${marcado ? 'marcado' : ''}">
        <div class="fila" data-ruta-punto="${p.id}">
          <span class="check">${marcado ? '✓' : ''}</span>
          <span class="nombre">${esc(p.nombre)}</span>
        </div>
        ${chips}
      </div>`;
  }).join('');

  return `
    <div class="card sintoma">
      <div class="equipo-tag">${r.id} · ${esc(r.equipo)}</div>
      <h2>${esc(r.titulo)}</h2>
      <p>Marcá los puntos de la ruta. Frecuencia: <b>D</b> diario · <b>S</b> semanal · <b>M</b> mensual.</p>
    </div>
    <div class="reloj" id="ruta-reloj">${relojRutaHTML(rutaTiempo, r.tiempoSeg)}</div>
    <div class="card"><div class="ruta-lista">${items}</div></div>
    <button class="btn btn-primary" id="btn-terminar-ruta">Terminar ruta ✓</button>
    <div style="height:8px"></div>
    <button class="btn btn-ghost" id="btn-abandonar-ruta">← Volver</button>`;
}
function pantallaRutaResultado(app, res) {
  const filas = res.detalle.map((d) => {
    let cls, ico, extra = '';
    if (d.pertenece && d.marcado) {
      cls = 'ok'; ico = '✓';
      extra = d.frecuenciaOk
        ? `<span class="frec-ok">frecuencia ${d.frecuenciaElegida} ✓</span>`
        : `<span class="frec-mal">era ${d.frecuenciaCorrecta}${d.frecuenciaElegida ? `, marcaste ${d.frecuenciaElegida}` : ', sin frecuencia'}</span>`;
    } else if (d.pertenece && !d.marcado) {
      cls = 'omit'; ico = '○'; extra = `<span class="frec-mal">omitido (era ${d.frecuenciaCorrecta})</span>`;
    } else if (!d.pertenece && d.marcado) {
      cls = 'mal'; ico = '✗'; extra = `<span class="frec-mal">${esc(d.motivo || 'distractor')}</span>`;
    } else {
      cls = 'bien-omit'; ico = '·'; extra = `<span class="frec-ok">distractor evitado</span>`;
    }
    return `<div class="ruta-res ${cls}"><span class="ico">${ico}</span><span class="n">${esc(d.nombre)}</span>${extra}<span class="g">${d.ganado >= 0 ? '+' : ''}${d.ganado}</span></div>`;
  }).join('');

  return `
    <div class="card">
      <div class="score-hero">
        <div class="num">${res.totalPct}<small> / 100</small></div>
        <div class="veredicto ${res.totalPct >= 70 ? 'ok' : 'mal'}">${res.total} pts · ${res.aciertos}/${res.perteneceTot} puntos, ${res.frecuenciasCorrectas} frecuencias, ${res.distractoresMarcados} distractores</div>
      </div>
    </div>
    <div class="card"><div class="ruta-detalle">${filas}</div></div>
    <div class="btn-row">
      <button class="btn btn-ghost" id="btn-rutas">← Rutas</button>
      <button class="btn btn-primary" id="btn-ruta-reintentar">Reintentar ↻</button>
    </div>`;
}

/* ===== js/main.js ===== */
const ui = { RANGOS, rangoDe, desbloqueado, pantallaInicio, pantallaInspeccion, pantallaDiagnostico, pantallaReparacion, pantallaResultado, relojRutaHTML, pantallaRuta, pantallaRutaResultado };

// ============================================================
// main.js — Orquestación y máquina de estados de pantallas.
// La lógica de puntaje vive en engine.js; aquí solo hay estado
// de presentación, persistencia de progreso y despacho a la UI.
//
// Pantallas: inicio → inspeccion → diagnostico → reparacion → resultado
// ============================================================






const $ = (sel) => document.querySelector(sel);
const pantalla = $('#pantalla');
const pillRango = $('#pill-rango');

// --- Persistencia de progreso (con fallback en memoria si no hay storage) ---
const CLAVE = 'ilc-diagnostico-progreso';
function cargarProgreso() {
  try {
    const raw = localStorage.getItem(CLAVE);
    if (raw) return JSON.parse(raw);
  } catch { /* file:// o storage bloqueado: seguimos en memoria */ }
  return { best: {}, aprobado: {} };
}
function guardarProgreso() {
  try { localStorage.setItem(CLAVE, JSON.stringify(app.progreso)); } catch { /* sin persistencia */ }
}

// Fuente de semilla para barajar la presentación (no afecta el puntaje).
let semillaSeq = (Date.now() % 100000) >>> 0;
const nuevaSemilla = () => (semillaSeq = (semillaSeq * 1103515245 + 12345) >>> 0);

const app = {
  pantalla: 'inicio',
  modo: 'diagnostico', // 'diagnostico' | 'ruta'
  especialidad: 'MEC',
  casoId: null,
  view: null,        // caso con puntos/hipótesis/repuestos barajados (presentación)
  estado: null,      // estado del motor
  seleccionHip: null,
  seleccionRep: null,
  repuestosSel: [],
  resultado: null,
  ultimoRevelado: null, // último punto revelado (para animar solo ese)
  sonido: true,
  _ultimaPantalla: null,
  progreso: cargarProgreso(),
  // Modo Ruta de Inspección
  rutaView: null,
  marcas: {},
  rutaTiempo: 0,
  rutaTimer: null,
  rutaResultado: null,
};

// ------------------------------------------------------------
// Render maestro
// ------------------------------------------------------------
function render() {
  actualizarPill();
  if (app.pantalla === 'inicio') pantalla.innerHTML = ui.pantallaInicio(app);
  else if (app.pantalla === 'inspeccion') pantalla.innerHTML = ui.pantallaInspeccion(app);
  else if (app.pantalla === 'diagnostico') pantalla.innerHTML = ui.pantallaDiagnostico(app);
  else if (app.pantalla === 'reparacion') pantalla.innerHTML = ui.pantallaReparacion(app);
  else if (app.pantalla === 'resultado') pantalla.innerHTML = ui.pantallaResultado(app, app.resultado);
  else if (app.pantalla === 'ruta') pantalla.innerHTML = ui.pantallaRuta(app);
  else if (app.pantalla === 'rutaResultado') pantalla.innerHTML = ui.pantallaRutaResultado(app, app.rutaResultado);
  // Transición suave y scroll al tope SOLO al cambiar de pantalla; en los
  // refrescos internos (revelar punto, marcar ítem) se conserva la posición.
  if (app.pantalla !== app._ultimaPantalla) {
    pantalla.classList.remove('fade-in');
    void pantalla.offsetWidth; // fuerza reflow para reiniciar la animación
    pantalla.classList.add('fade-in');
    app._ultimaPantalla = app.pantalla;
    window.scrollTo(0, 0);
  }
}

// ------------------------------------------------------------
// Retroalimentación sutil: háptico + tick de audio (WebAudio)
// ------------------------------------------------------------
let _ac = null;
function tick(fuerte) {
  if (!app.sonido) return;
  try {
    _ac = _ac || new (window.AudioContext || window.webkitAudioContext)();
    if (_ac.state === 'suspended') _ac.resume();
    const o = _ac.createOscillator(), g = _ac.createGain();
    o.type = 'sine';
    o.frequency.value = fuerte ? 880 : 440;
    o.connect(g); g.connect(_ac.destination);
    const t = _ac.currentTime;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(fuerte ? 0.09 : 0.045, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.14);
    o.start(t); o.stop(t + 0.15);
  } catch { /* sin audio disponible */ }
}
function vibrar(patron) { try { if (navigator.vibrate) navigator.vibrate(patron); } catch { /* sin háptico */ } }

function actualizarPill() {
  if (app.modo === 'ruta') { pillRango.textContent = 'Ruta de inspección'; return; }
  const casos = CASOS.filter((c) => c.especialidad === app.especialidad);
  const acum = casos.reduce((a, c) => a + (app.progreso.best[c.id] || 0), 0);
  pillRango.textContent = `${ui.rangoDe(acum).nombre} · ${acum} pts`;
}

// ------------------------------------------------------------
// Transiciones
// ------------------------------------------------------------
function abrirCaso(casoId) {
  const caso = CASOS_POR_ID[casoId];
  if (!caso || !ui.desbloqueado(caso, app.progreso)) return;
  app.casoId = casoId;
  app.view = barajarCaso(caso, nuevaSemilla());
  app.estado = crearEstadoCaso(caso);
  app.seleccionHip = null;
  app.seleccionRep = null;
  app.repuestosSel = [];
  app.resultado = null;
  app.ultimoRevelado = null;
  app.pantalla = 'inspeccion';
  render();
}

function confirmarDiagnostico() {
  if (!app.seleccionHip) return;
  diagnosticar(app.estado, app.seleccionHip);
  app.pantalla = 'reparacion';
  render();
}

function ejecutarReparacion() {
  if (!app.seleccionRep) return;
  reparar(app.estado, app.seleccionRep, app.repuestosSel);
  const res = evaluarCaso(app.estado);
  app.resultado = res;
  // Guardar mejor puntaje y aprobación.
  const prev = app.progreso.best[app.casoId] || 0;
  if (res.total > prev) app.progreso.best[app.casoId] = res.total;
  if (res.aprobado) app.progreso.aprobado[app.casoId] = true;
  guardarProgreso();
  app.pantalla = 'resultado';
  render();
}

function siguienteCaso() {
  const lista = CASOS.filter((c) => c.especialidad === app.especialidad);
  const i = lista.findIndex((c) => c.id === app.casoId);
  const siguiente = lista.slice(i + 1).find((c) => ui.desbloqueado(c, app.progreso));
  if (siguiente) abrirCaso(siguiente.id);
  else { app.pantalla = 'inicio'; render(); }
}

// ------------------------------------------------------------
// Modo Ruta de Inspección
// ------------------------------------------------------------
function detenerRutaTimer() { if (app.rutaTimer) { clearInterval(app.rutaTimer); app.rutaTimer = null; } }

function iniciarRutaTimer() {
  detenerRutaTimer();
  app.rutaTimer = setInterval(() => {
    app.rutaTiempo -= 1;
    const reloj = document.querySelector('#ruta-reloj');
    if (reloj) reloj.innerHTML = ui.relojRutaHTML(app.rutaTiempo, app.rutaView.tiempoSeg);
    if (app.rutaTiempo <= 0) terminarRuta();
  }, 1000);
}

function abrirRuta(rutaId) {
  const ruta = RUTAS_POR_ID[rutaId];
  if (!ruta) return;
  app.rutaView = barajarRuta(ruta, nuevaSemilla());
  app.marcas = {};
  app.rutaTiempo = ruta.tiempoSeg;
  app.rutaResultado = null;
  app.pantalla = 'ruta';
  render();
  iniciarRutaTimer();
}

function terminarRuta() {
  detenerRutaTimer();
  app.rutaResultado = evaluarRuta(app.rutaView, app.marcas);
  app.pantalla = 'rutaResultado';
  render();
}

// ------------------------------------------------------------
// Eventos (delegados sobre #pantalla)
// ------------------------------------------------------------
pantalla.addEventListener('click', (e) => {
  const t = e.target;
  const cerca = (attr) => t.closest(`[${attr}]`);

  // Pantalla 1 — Inicio: modo, especialidad, caso, ruta
  const md = cerca('data-modo');
  if (md) { detenerRutaTimer(); app.modo = md.dataset.modo; app.pantalla = 'inicio'; return render(); }
  const esp = cerca('data-esp');
  if (esp) { app.especialidad = esp.dataset.esp; return render(); }
  const caso = cerca('data-caso');
  if (caso) return abrirCaso(caso.dataset.caso);
  const ruta = cerca('data-ruta');
  if (ruta) return abrirRuta(ruta.dataset.ruta);

  // Modo Ruta — checklist
  const rp = cerca('data-ruta-punto');
  if (rp) {
    const id = rp.dataset.rutaPunto;
    if (Object.prototype.hasOwnProperty.call(app.marcas, id)) delete app.marcas[id];
    else app.marcas[id] = null;
    return render();
  }
  const rf = cerca('data-ruta-frec');
  if (rf) {
    const [id, f] = rf.dataset.rutaFrec.split(':');
    app.marcas[id] = f;
    return render();
  }
  if (t.closest('#btn-terminar-ruta')) return terminarRuta();
  if (t.closest('#btn-abandonar-ruta')) { detenerRutaTimer(); app.pantalla = 'inicio'; return render(); }
  if (t.closest('#btn-rutas')) { app.pantalla = 'inicio'; return render(); }
  if (t.closest('#btn-ruta-reintentar')) return abrirRuta(app.rutaView.id);

  // Pantalla 2 — Inspección
  if (t.closest('[data-sonido]')) { app.sonido = !app.sonido; if (app.sonido) tick(false); return render(); }
  const punto = cerca('data-punto');
  if (punto) {
    const pid = punto.dataset.punto;
    const r = revelarPunto(app.estado, pid);
    if (r.ok) {
      app.ultimoRevelado = pid;
      const def = app.view.puntos.find((p) => p.id === pid);
      if (def && def.clave) { vibrar([12, 45, 20]); tick(true); }  // pista clave: destello + doble pulso
      else { vibrar(8); tick(false); }
    }
    return render();
  }
  if (t.closest('#btn-diagnosticar')) { app.pantalla = 'diagnostico'; app.seleccionHip = null; return render(); }
  if (t.closest('#btn-abandonar')) { app.pantalla = 'inicio'; return render(); }

  // Pantalla 3 — Diagnóstico
  const hip = cerca('data-hip');
  if (hip) { app.seleccionHip = hip.dataset.hip; return render(); }
  if (t.closest('#btn-confirmar-dx')) return confirmarDiagnostico();
  if (t.closest('#btn-volver-insp')) { app.pantalla = 'inspeccion'; return render(); }

  // Pantalla 4 — Reparación
  const rep = cerca('data-rep');
  if (rep) { app.seleccionRep = rep.dataset.rep; return render(); }
  const repuesto = cerca('data-repuesto');
  if (repuesto) {
    const v = repuesto.dataset.repuesto;
    const i = app.repuestosSel.indexOf(v);
    if (i >= 0) app.repuestosSel.splice(i, 1); else app.repuestosSel.push(v);
    return render();
  }
  if (t.closest('#btn-reparar')) return ejecutarReparacion();

  // Pantalla 5 — Resultado
  if (t.closest('#btn-siguiente')) return siguienteCaso();
  if (t.closest('#btn-taller')) { app.pantalla = 'inicio'; return render(); }
});

// ------------------------------------------------------------
render();

})();
  </script>
</body>
</html>
